    <text x="115" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#10b981">UK REGISTERED COMPANY</text>
    <text x="115" y="72" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="24" font-weight="800" fill="#ffffff">CSOAI LTD</text>
    <text x="115" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Company No. 16939677</text>
