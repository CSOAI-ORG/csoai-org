    <circle cx="90" cy="90" r="68" fill="#10b981" opacity="0.30"/>
    <path d="M90 32 L138 52 L138 96 C138 132 116 158 90 172 C64 158 42 132 42 96 L42 52 Z" fill="#10b981"/>
    <path d="M72 96 L86 110 L112 78" stroke="#0a0a0f" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="340" y="232" font-family="'Space Grotesk', system-ui, -apple-system, sans-serif" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-2">CSOAI</text>
  <text x="343" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="600" fill="#94a3b8">Council for the Safety of AI</text>

