<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful — CSOAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #c9a84c; --bg: #0a0a0f; --surface: #11111a; --text: #f8fafc; --emerald: #10B981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .card { background: var(--surface); padding: 4rem; border-radius: 32px; border: 1px solid rgba(201,168,76,0.2); max-width: 600px; box-shadow: 0 0 50px rgba(16, 185, 129, 0.1); }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; margin-bottom: 1.5rem; color: var(--emerald); }
        p { font-size: 1.25rem; color: #94a3b8; margin-bottom: 3rem; }
        .btn { display: inline-block; padding: 1.25rem 3rem; background: var(--primary); color: #000; border-radius: 12px; font-weight: 800; text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(201, 168, 76, 0.4); }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 5rem; margin-bottom: 2rem;">✅</div>
        <h1>PAYMENT SECURED</h1>
        <p>Your transaction was successful. Our BFT Council is now provisioning your certification and generating your did:csoai ID. You will receive an email confirmation shortly.</p>
        <a href="index.html" class="btn">Return to Dome</a>
    </div>
</body>
</html>
